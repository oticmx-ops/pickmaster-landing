<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="2" y1="6" x2="46" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B6FF5"/>
      <stop offset="100%" stop-color="#6E94FF"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square centered vertically in 56px -->
