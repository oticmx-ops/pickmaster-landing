  <rect x="20.5" y="23" width="7" height="17" rx="2" fill="white" fill-opacity="0.82"/>
  <rect x="30.5" y="16" width="7" height="24" rx="2" fill="white"/>
  <!-- Wordmark -->
  <text x="58" y="35" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.3">PickMaster</text>
